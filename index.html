<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bonanza C21 | Portafolio Maestro Paraguay</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #c5a059;
            --gold-gradient: linear-gradient(135deg, #c5a059 0%, #f1d38a 50%, #b38b45 100%);
            --black: #000000;
            --dark: #0a0a0a;
            --transition: 0.7s cubic-bezier(0.85, 0, 0.15, 1);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--black); font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }

        /* --- 1. PORTADA CON TU IMAGEN --- */
        #hero {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: fixed; inset: 0; z-index: 1000; transition: var(--transition);
            /* USANDO TU IMAGEN DE PORTADA */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), 
                        url('https://images2.imgbox.com/39/10/7Fof4X7J_o.png') center/cover no-repeat;
        }

        .oracle-text {
            font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 8vw, 5.5rem); font-weight: 700;
            color: white; text-transform: uppercase; letter-spacing: clamp(5px, 2vw, 15px);
            text-shadow: 0 5px 15px rgba(0,0,0,0.8); margin: 0;
        }

        .cta-gold {
            margin-top: 40px; padding: 18px 50px; font-family: 'Cinzel', serif;
            color: var(--gold); background: rgba(0,0,0,0.6); border: 2px solid var(--gold);
            cursor: pointer; letter-spacing: 4px; transition: 0.4s; font-size: 13px;
            backdrop-filter: blur(5px);
        }
        .cta-gold:hover { background: var(--gold); color: black; box-shadow: 0 0 50px rgba(197, 160, 89, 0.7); transform: scale(1.05); }

        /* --- 2. ÍNDICE GEOGRÁFICO --- */
        #market-index {
            height: 100vh; display: flex; flex-direction: column; padding: 40px 20px;
            position: fixed; inset: 0; z-index: 900; opacity: 0; transform: translateY(100%); transition: var(--transition);
            background: var(--black); overflow-y: auto; box-sizing: border-box;
        }

        .grid-zones {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;
            max-width: 1400px; margin: 30px auto; width: 100%;
        }

        .zone-card { background: var(--dark); border: 1px solid rgba(197, 160, 89, 0.1); padding: 25px; transition: 0.4s; cursor: pointer; text-align: center;}
        .zone-card:hover { border-color: var(--gold); transform: translateY(-5px); background: rgba(197, 160, 89, 0.05);}
        .zone-title { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.2rem; margin-bottom: 5px; }
        .zone-subtitle { font-size: 9px; color: #666; letter-spacing: 2px; text-transform: uppercase;}

        /* --- 3. SUBDIRECTORIO --- */
        #subdirectory {
            position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,0.98);
            display: none; flex-direction: column; align-items: center; padding: 60px 20px;
            backdrop-filter: blur(15px); overflow-y: auto; animation: fadeIn 0.4s forwards;
        }

        .sub-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; width: 100%; max-width: 1200px; margin-top: 30px;}
        .prop-card-sub { 
            background: #0d0d0d; border: 1px solid #1a1a1a; padding: 20px; text-align: left; 
            transition: 0.3s; cursor: pointer;
        }
        .prop-card-sub:hover { border-color: var(--gold); background: #151515; }
        .prop-card-sub h4 { font-family: 'Cinzel', serif; color: var(--gold); margin: 0 0 5px 0; font-size: 13px; }
        .prop-card-sub p { font-size: 10px; color: #777; margin: 0; }

        /* --- 4. BÓVEDA DETALLE --- */
        #detail-view {
            position: fixed; inset: 0; background: var(--black); z-index: 2000;
            display: none; grid-template-columns: 80px 1fr; animation: fadeIn 0.6s forwards;
        }

        #detail-sidebar { background: #050505; border-right: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }

        .dock-btn { width: 45px; height: 45px; border-radius: 50%; border: 1px solid rgba(197, 160, 89, 0.2); background: transparent; color: var(--gold); cursor: pointer; transition: 0.4s; }
        .dock-btn.active { background: var(--gold-gradient); color: black; transform: scale(1.1); }

        .content-frame { display: grid; grid-template-columns: 1.2fr 0.8fr; align-items: center; padding: 40px; gap: 40px; height: 100%; box-sizing: border-box; }
        .carousel-container { position: relative; width: 100%; height: 75vh; border: 1px solid var(--gold); padding: 5px; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #carousel-track { width: 100%; height: 100%; position: relative; }
        .carousel-slide { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; opacity: 0; transform: scale(1.05); transition: 0.5s; }
        .carousel-slide.active { opacity: 1; transform: scale(1); z-index: 5; }
        .carousel-nav { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px;}
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; border: 1px solid var(--gold); }
        .dot.active { background: var(--gold); transform: scale(1.3); }

        .close-btn { position: absolute; top: 25px; right: 30px; color: var(--gold); font-size: 1.8rem; cursor: pointer; z-index: 3000; }

        @media (max-width: 900px) {
            #detail-view { grid-template-columns: 1fr; grid-template-rows: 1fr 70px; }
            #detail-sidebar { flex-direction: row; order: 2; height: 70px; width: 100%; position: fixed; bottom: 0; }
            .content-frame { grid-template-columns: 1fr; padding: 20px; overflow-y: auto; padding-bottom: 100px; align-items: start;}
            .carousel-container { height: 40vh; }
        }

        .revealed #hero { transform: translateY(-100%); }
        .revealed #market-index { opacity: 1; transform: translateY(0); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

        <div style="letter-spacing: 12px; font-size: 11px; color: white; margin-bottom: 15px; font-weight: 600;">CENTURY 21 BONANZA</div>
        <h1 class="oracle-text">ELITE PORTFOLIO</h1>
        <button class="cta-gold" onclick="openMarket()">INICIAR EXPLORACIÓN</button>
    </section>

            <h2 style="font-family:'Cinzel'; color:var(--gold); font-size: 2.2rem; margin:0;">Gala Index</h2>
            <p style="letter-spacing:5px; font-size:10px; opacity:0.6;">SEGMENTACIÓN ESTRATÉGICA PARAGUAY</p>
        </header>
        <div class="grid-zones" id="zones-container"></div>
    </main>

    <div id="subdirectory">
        <span class="close-btn" onclick="closeSub()"><i class="fas fa-arrow-left"></i></span>
        <h2 id="sub-zone-title" style="font-family:'Cinzel'; color:var(--gold); font-size: 1.8rem; margin:0;"></h2>
        <p style="letter-spacing:3px; font-size:10px; opacity:0.6;">LISTADO DE ACTIVOS EXCLUSIVOS</p>
        <div class="sub-grid" id="sub-grid-container"></div>
    </div>
