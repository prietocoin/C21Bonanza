<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonanza C21 | Luxury Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #c5a059 0%, #f1d38a 50%, #b38b45 100%);
            --soft-gold: #c5a059;
            --black: #0a0a0a;
            --dark-gray: #1a1a1a;
        }

        body { background-color: var(--black); color: #ffffff; font-family: 'Montserrat', sans-serif; margin: 0; }
        
        /* Estilos de Edición */
        [contenteditable="true"] { border: 1px dashed var(--soft-gold) !important; padding: 5px; min-width: 50px; }
        
        /* Panel Admin Flotante */
        #admin-panel {
            position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.9);
            border: 2px solid var(--soft-gold); padding: 20px; z-index: 9999;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.5); border-radius: 10px;
        }

        .gold-text { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Cinzel', serif; font-weight: 700; }

        .hero {
            height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=2070') center/cover;
            border-bottom: 2px solid var(--soft-gold);
        }

        .hero-box { padding: 40px; border: 1px solid rgba(197, 160, 89, 0.3); backdrop-filter: blur(10px); }

        .btn-gala { background: transparent; border: 1px solid var(--soft-gold); color: var(--soft-gold); padding: 12px 30px; font-family: 'Cinzel', serif; cursor: pointer; text-transform: uppercase; margin: 5px; }
        
        .display-card { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; max-width: 1000px; margin: 50px auto; background: var(--dark-gray); padding: 40px; border: 1px solid #333; }

        .hidden { display: none !important; }
        .admin-input { background: #000; color: var(--soft-gold); border: 1px solid var(--soft-gold); padding: 8px; margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div id="login-section">
            <p style="color:var(--soft-gold); margin-top:0;">Clave de Acceso:</p>
            <input type="password" id="pass" class="admin-input">
            <button class="btn-gala" onclick="login()" style="width:100%">Entrar</button>
        </div>
        <div id="tools-section" class="hidden">
            <p style="color:var(--soft-gold); margin-top:0;">MODO EDITOR ACTIVO</p>
            <button class="btn-gala" onclick="saveCode()" style="width:100%; background:var(--soft-gold); color:black;">EXPORTAR CAMBIOS</button>
            <p style="font-size: 10px; margin-top: 10px;">Cambia los textos haciendo clic en ellos.</p>
        </div>
    </div>

    <section class="hero">
        <div class="hero-box">
            <h1 class="gold-text" id="prop-title" contenteditable="false" style="font-size: 3rem;">BONANZA C21</h1>
            <p id="prop-subtitle" contenteditable="false">PORTAFOLIO DE INVERSIÓN ÉLITE</p>
        </div>
    </section>

    <div class="display-card">
        <div>
            <img id="main-img" src="https://images.unsplash.com/photo-1600607687940-4e524cb35d5a?q=80&w=600" style="width:100%; border: 1px solid var(--soft-gold);">
            <div id="img-editor" class="hidden" style="margin-top:10px;">
                <input type="text" id="img-url" class="admin-input" placeholder="URL de la imagen nueva" oninput="updateImg()">
            </div>
        </div>
        <div>
            <h2 class="gold-text" id="card-title" contenteditable="false">Características</h2>
            <p id="card-desc" contenteditable="false">Edita este texto con los beneficios de la propiedad.</p>
        </div>
    </div>

    <script>
        const CLAVE_MAESTRA = "C21BONANZA"; // <--- CAMBIA TU CLAVE AQUÍ

        function login() {
            const p = document.getElementById('pass').value;
            if(p === CLAVE_MAESTRA) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('tools-section').classList.remove('hidden');
                document.getElementById('img-editor').classList.remove('hidden');
                
                // Habilitar edición de texto
                document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = "true");
                alert("Modo Editor de Gala Activado. Haz clic en los textos para editar.");
            } else {
                alert("Clave incorrecta");
            }
        }

        function updateImg() {
            const url = document.getElementById('img-url').value;
            if(url) document.getElementById('main-img').src = url;
        }

        function saveCode() {
            // Eliminar el panel antes de copiar el código
            const panel = document.getElementById('admin-panel');
            panel.classList.add('hidden');
            
            // Deshabilitar edición para el código final
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = "false");
            
            const fullHTML = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            
            // Crear un archivo para descargar
            const blob = new Blob([fullHTML], {type: "text/html"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "index.html";
            a.click();
            
            // Restaurar panel
            panel.classList.remove('hidden');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = "true");
        }
    </script>
</body>
</html>
