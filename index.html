<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bonanza C21 | Portafolio Geográfico de Gala</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #c5a059;
            --gold-gradient: linear-gradient(135deg, #c5a059 0%, #f1d38a 50%, #b38b45 100%);
            --black: #000000;
            --dark-gray: #0a0a0a;
            --transition-slow: 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--black); font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }

        /* --- 1. PORTADA ESPECTRAL (INTRO) --- */
        #intro {
            height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; position: fixed; inset: 0; z-index: 1000; transition: var(--transition-slow);
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            padding: 20px; box-sizing: border-box;
        }

        .gold-brand { letter-spacing: 10px; font-size: 11px; color: var(--gold); margin-bottom: 20px; font-weight: 200; font-family: 'Montserrat', sans-serif; }

        .oracle-text {
            font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 8vw, 6.5rem); font-weight: 700;
            background: url('https://images.pexels.com/photos/323780/pexels-photo-323780.jpeg?auto=compress&cs=tinysrgb&w=1260') center/cover;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textFlow 30s infinite linear; text-transform: uppercase; letter-spacing: clamp(5px, 2vw, 15px); margin: 0;
        }

        @keyframes textFlow { from { background-position: 0% 50%; } to { background-position: 100% 50%; } }

        .cta-liquid {
            margin-top: 50px; padding: 16px 40px; font-family: 'Cinzel', serif;
            color: var(--gold); background: transparent; border: 1px solid var(--gold);
            cursor: pointer; letter-spacing: 3px; font-size: 13px; transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .cta-liquid:hover { background: var(--gold); color: black; box-shadow: 0 0 30px rgba(197, 160, 89, 0.5); transform: scale(1.05); }

        /* --- 2. ÍNDICE GEOGRÁFICO DE GALA (SEGUNDA PÁGINA) --- */
        #gala-index {
            height: 100vh; display: flex; flex-direction: column;
            opacity: 0; transform: translateY(50px); transition: var(--transition-slow);
            background: #000; padding: 40px 20px; box-sizing: border-box;
            overflow-y: auto; /* Permitir scroll si el contenido es muy alto */
        }

        .index-header { text-align: center; margin-bottom: 50px; padding-top: 20px;}
        .index-header h2 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 4vw, 3rem); background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; letter-spacing: 4px;}
        .index-header p { font-weight: 200; font-size: 12px; letter-spacing: 5px; color: #ccc; text-transform: uppercase; margin-top: 10px;}

        /* Grid de Puntos Cardinales */
        .cardinal-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px;
            max-width: 1100px; margin: 0 auto 50px auto; width: 100%;
        }

        .cardinal-zone {
            background: #0a0a0a; border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 30px; transition: 0.4s;
            position: relative; overflow: hidden;
        }
        .cardinal-zone:hover { border-color: var(--gold); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(197,160,89,0.1); }

        /* Icono de Brújula de Fondo */
        .zone-bg-icon {
            position: absolute; right: -20px; bottom: -20px; font-size: 10rem;
            color: rgba(197, 160, 89, 0.03); transform: rotate(-15deg); pointer-events: none;
        }

        .zone-title {
            font-family: 'Cinzel', serif; font-size: 1.5rem; color: var(--gold);
            letter-spacing: 3px; margin-bottom: 25px; display: flex; align-items: center; gap: 15px;
        }
        .zone-title i { font-size: 1rem; opacity: 0.7; }

        /* Lista de Propiedades Aleatorias */
        .property-list { list-style: none; padding: 0; margin: 0; }
        .property-item {
            font-weight: 200; font-size: 1.1rem; color: #eee;
            padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s; cursor: pointer;
        }
        .property-item:hover { color: var(--gold); padding-left: 10px; background: rgba(197, 160, 89, 0.03);}
        .property-item i { font-size: 12px; color: var(--gold); opacity: 0; transition: 0.3s; }
        .property-item:hover i { opacity: 1; transform: translateX(-10px); }

        /* Botón Volver */
        .back-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: rgba(197, 160, 89, 0.1); border: 1px solid var(--gold);
            color: var(--gold); font-family: 'Cinzel', serif; font-size: 10px;
            padding: 10px 20px; cursor: pointer; letter-spacing: 2px; z-index: 1100;
            transition: 0.3s;
        }
        .back-btn:hover { background: var(--gold); color: black; }

        @media (max-width: 768px) {
            .cardinal-grid { grid-template-columns: 1fr; gap: 20px; padding-bottom: 80px;}
