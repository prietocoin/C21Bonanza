<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonanza C21 | Luxury Real Estate</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #c5a059 0%, #f1d38a 50%, #b38b45 100%);
            --soft-gold: #c5a059;
            --black: #0a0a0a;
            --dark-gray: #1a1a1a;
        }

        body {
            background-color: var(--black);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            line-height: 1.6;
        }

        /* Títulos en Dorado Metálico */
        .gold-text {
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', serif;
            font-weight: 700;
        }

        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=2070') center/cover;
            border-bottom: 2px solid var(--soft-gold);
        }

        .hero-box {
            padding: 40px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        /* Selector Interactivo */
        .selector-wrapper {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-gold {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .btn-gala {
            background: transparent;
            border: 1px solid var(--soft-gold);
            color: var(--soft-gold);
            padding: 12px 30px;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-gala:hover, .btn-gala.active {
            background: var(--gold);
            color: var(--black);
            font-weight: bold;
        }

        .display-card {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: var(--dark-gray);
            border: 1px solid #333;
            padding: 40px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .display-card { grid-template-columns: 1fr; }
        }

        .img-frame {
            border: 1px solid var(--soft-gold);
            padding: 10px;
            line-height: 0;
        }

        .img-frame img { width: 100%; transition: 0.5s; }

        input, textarea {
            background: #111;
            border: 1px solid #333;
            border-bottom: 2px solid var(--soft-gold);
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-send {
            background: var(--gold);
            border: none;
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-box">
            <h1 class="gold-text" style="font-size: 3.5rem; margin-bottom: 0;">BONANZA C21</h1>
            <p style="letter-spacing: 5px; font-weight: 200;">PORTAFOLIO DE INVERSIÓN ÉLITE</p>
        </div>
    </section>

    <div class="selector-wrapper">
        <div class="nav-gold">
            <button class="btn-gala active" onclick="change(this, 'area')">Áreas</button>
            <button class="btn-gala" onclick="change(this, 'amenities')">Amenities</button>
            <button class="btn-gala" onclick="change(this, 'specs')">Especificaciones</button>
        </div>

        <div class="display-card" id="main-card">
            <div class="img-frame">
                <img id="main-img" src="https://images.unsplash.com/photo-1600607687940-4e524cb35d5a?q=80&w=600" alt="Lujo">
            </div>
            <div>
                <h2 id="main-title" class="gold-text">Dimensiones de Gala</h2>
                <p id="main-desc">Espacios diseñados bajo un concepto de arquitectura abierta, maximizando la luz natural y la fluidez entre ambientes.</p>
                <ul id="main-list" style="color: var(--soft-gold); font-size: 0.9rem;">
                    <li>350m² de Construcción</li>
                    <li>Techos de Doble Altura</li>
                    <li>Mármol Carrara en Pisos</li>
                </ul>
            </div>
        </div>
    </div>

    <section style="background: #000; padding: 100px 20px; text-align: center;">
        <h2 class="gold-text">Interesado en esta Propiedad</h2>
        <form style="max-width: 600px; margin: 40px auto;">
            <input type="text" placeholder="Nombre y Apellido">
            <input type="email" placeholder="Email de Contacto">
            <textarea placeholder="Consulta privada..."></textarea>
            <button class="btn-send">CONTACTAR AGENTE EXCLUSIVO</button>
        </form>
    </section>

    <script>
        const info = {
            area: {
                t: "Dimensiones de Gala",
                d: "Espacios diseñados bajo un concepto de arquitectura abierta, maximizando la luz natural y la fluidez entre ambientes.",
                l: ["350m² de Construcción", "Techos de Doble Altura", "Mármol Carrara en Pisos"],
                i: "https://images.unsplash.com/photo-1600607687940-4e524cb35d5a?q=80&w=600"
            },
            amenities: {
                t: "Servicios de Élite",
                d: "Cada detalle ha sido pensado para el confort absoluto del residente más exigente.",
                l: ["Piscina Climatizada", "Cava de Vinos Privada", "Cine en Casa Pro"],
                i: "https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=600"
            },
            specs: {
                t: "Tecnología y Confort",
                d: "Integración total con sistemas inteligentes de última generación para el control del hogar.",
                l: ["Domótica Integral", "Energía Solar", "Seguridad Blindada"],
                i: "https://images.unsplash.com/photo-1558002038-103792e17734?q=80&w=600"
            }
        };

        function change(btn, key) {
            document.querySelectorAll('.btn-gala').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            const item = info[key];
            document.getElementById('main-title').innerText = item.t;
            document.getElementById('main-desc').innerText = item.d;
            document.getElementById('main-img').src = item.i;
            
            const list = document.getElementById('main-list');
            list.innerHTML = item.l.map(x => `<li>${x}</li>`).join('');
        }
    </script>
</body>
</html>
