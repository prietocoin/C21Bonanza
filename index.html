<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bonanza C21 | Portafolio de Gala</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: linear-gradient(135deg, #c5a059 0%, #f1d38a 50%, #b38b45 100%);
            --soft-gold: #c5a059;
            --black: #050505;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Montserrat', sans-serif; background: var(--black); color: white; overflow-x: hidden; }

        /* PORTADA PRINCIPAL */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?q=80&w=2000') center/cover no-repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .gold-title { 
            background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            font-family: 'Cinzel', serif; font-size: 4rem; margin: 0; letter-spacing: 8px;
        }

        /* EL BOTÓN LLAMATIVO */
        .cta-amenities {
            margin-top: 50px;
            padding: 20px 40px;
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            color: var(--soft-gold);
            background: transparent;
            border: 2px solid var(--soft-gold);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: 0.5s;
            letter-spacing: 3px;
            box-shadow: 0 0 20px rgba(197, 160, 89, 0.2);
        }

        .cta-amenities:hover {
            color: black;
            background: var(--soft-gold);
            box-shadow: 0 0 50px rgba(197, 160, 89, 0.6);
            transform: scale(1.05);
        }

        /* PANEL DESPLEGABLE (MODAL DE LUJO) */
        #vault {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 1000;
            display: none; /* Oculto por defecto */
            overflow-y: auto;
            padding: 50px 0;
            animation: fadeIn 0.5s ease;
        }

        .vault-content { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .close-vault {
            position: absolute; top: 30px; right: 50px;
            font-size: 2rem; color: var(--soft-gold); cursor: pointer;
        }

        /* TARJETAS BASTAS (BENEFICIOS SIN FIN) */
        .amenity-row {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;
            margin-bottom: 80px; align-items: center;
        }

        .amenity-row:nth-child(even) { direction: rtl; }
        .amenity-row:nth-child(even) .text-side { direction: ltr; }

        .img-side img { width: 100%; border: 1px solid var(--soft-gold); padding: 5px; }
        
        .text-side h3 { font-family: 'Cinzel', serif; color: var(--soft-gold); font-size: 2rem; margin-bottom: 10px; }
        .text-side p { line-height: 1.8; color: #ccc; font-weight: 200; }

        /* MODO EDITOR */
        #admin-panel { position: fixed; top: 20px; left: 20px; z-index: 2000; background: rgba(0,0,0,0.8); border: 1px solid var(--soft-gold); padding: 10px; border-radius: 5px; }
        .btn-save { background: var(--gold); border: none; padding: 10px; font-weight: bold; cursor: pointer; font-family: 'Cinzel', serif; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="admin-panel">
        <button class="btn-save" onclick="saveCode()">PUBLICAR CAMBIOS</button>
    </div>

    <section class="hero">
        <span style="letter-spacing: 10px; font-size: 12px; color: var(--soft-gold);">CORPORACIÓN BONANZA C21</span>
        <h1 class="gold-title" id="p-name" contenteditable="true">NOMBRE DE LA PROPIEDAD</h1>
        <p id="p-sub" contenteditable="true" style="letter-spacing: 4px; opacity: 0.8;">VALORACIÓN PREMIUM • UBICACIÓN EXCLUSIVA</p>
        
        <button class="cta-amenities" onclick="toggleVault()">VER AMENIDADES DE GALA</button>
    </section>

    <div id="vault">
        <span class="close-vault" onclick="toggleVault()"><i class="fas fa-times"></i></span>
        
        <div class="vault-content" id="amenities-container">
            </div>
    </div>

    <script>
        // AQUÍ PUEDES AGREGAR TODOS LOS BENEFICIOS QUE QUIERAS (SIN FIN)
        let propertyBenefits = [
            { t: "Piscina de Horizonte", d: "Espejo de agua climatizado con bordes invisibles hacia el valle.", i: "https://images.unsplash.com/photo-1576013551627-0cc20b96c2a7?q=80&w=1200" },
            { t: "Cava de Autor", d: "Espacio para 1000 botellas con control de temperatura inteligente.", i: "https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?q=80&w=1200" },
            { t: "Wellness & Spa", d: "Circuito de relajación privada con sauna y mármol de Carrara.", i: "https://images.unsplash.com/photo-1544161515-4ab6ce6db874?q=80&w=1200" }
        ];

        function toggleVault() {
            const v = document.getElementById('vault');
            v.style.display = (v.style.display === 'block') ? 'none' : 'block';
            if(v.style.display === 'block') renderBenefits();
        }

        function renderBenefits() {
            const container = document.getElementById('amenities-container');
            container.innerHTML = `<h2 class="gold-title" style="font-size: 2.5rem; text-align:center; margin-bottom: 80px;">Beneficios Exclusivos</h2>` + 
            propertyBenefits.map((b, idx) => `
                <div class="amenity-row">
                    <div class="img-side">
                        <img src="${b.i}" alt="Amenity">
                        <input type="text" value="${b.i}" style="width:100%; background:#000; color:white; border:1px solid #333; font-size:10px; margin-top:5px;" oninput="updateImg(${idx}, this.value)">
                    </div>
                    <div class="text-side">
                        <h3 contenteditable="true" oninput="updateText(${idx}, 't', this.innerText)">${b.t}</h3>
                        <p contenteditable="true" oninput="updateText(${idx}, 'd', this.innerText)">${b.d}</p>
                    </div>
                </div>
            `).join('');
        }

        function updateText(idx, key, val) { propertyBenefits[idx][key] = val; }
        function updateImg(idx, val) { propertyBenefits[idx].i = val; }

        function saveCode() {
            document.getElementById('admin-panel').style.display = 'none';
            document.querySelectorAll('[contenteditable]').forEach(e => e.contentEditable = "false");
            
            // Inyectar datos en el script
            const scriptTag = document.querySelector('script');
            const dataStr = `let propertyBenefits = ${JSON.stringify(propertyBenefits, null, 4)};`;
            scriptTag.text = scriptTag.text.replace(/let propertyBenefits = \[[\s\S]*?\];/, dataStr);

            const blob = new Blob(["<!DOCTYPE html>\n" + document.documentElement.outerHTML], {type: "text/html"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "index.html";
            a.click();
            
            document.getElementById('admin-panel').style.display = 'block';
            document.querySelectorAll('[contenteditable]').forEach(e => e.contentEditable = "true");
        }

        // Carga inicial
        renderBenefits();
    </script>
</body>
</html>
